<svg width="100%" viewBox="0 0 680 660" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Shelfbot motor layout — top view</title>
<desc>
Top-view schematic of the shelfbot chassis showing motor numbers M0–M3,
their left/right side groupings, ROS joint names, and ESP32 GPIO
PULSE/DIR pin assignments. Motor 4 is an auxiliary (non-drive) motor.
</desc>

<defs>
  <marker id="arrow"
          viewBox="0 0 10 10"
          refX="8"
          refY="5"
          markerWidth="6"
          markerHeight="6"
          orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9"
          fill="none"
          stroke="context-stroke"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </marker>
</defs>

<!-- TITLE -->
<text x="340"
      y="26"
      text-anchor="middle"
      font-family="Segoe UI, sans-serif"
      font-size="14"
      font-weight="500"
      fill="#141413">
  Shelfbot motor layout — top view
</text>

<text x="340"
      y="45"
      text-anchor="middle"
      font-family="Segoe UI, sans-serif"
      font-size="12"
      fill="#3d3d3a">
  Blue = left side (−X). Coral = right side (+X). Robot faces +Y (front = top of diagram).
</text>

<!-- FRONT ARROW -->
<line x1="340"
      y1="93"
      x2="340"
      y2="64"
      marker-end="url(#arrow)"
      stroke="#73726c"
      stroke-width="1.5"/>

<text x="340"
