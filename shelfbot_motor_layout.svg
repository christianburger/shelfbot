      font-size="12"
      fill="#3d3d3a">
  Kinematics: vel_left = (vx − ω·L/2) / r     vel_right = (vx + ω·L/2) / r
</text>

<text x="56"
      y="628"
      font-family="Segoe UI, sans-serif"
      font-size="12"
      fill="#3d3d3a">
  L = 0.50 m (wheel sep), r = 0.075 m (radius), +ω = turn left (CCW) → right side faster
</text>

