      font-family="Segoe UI, sans-serif"
      font-size="12"
      fill="#3d3d3a">
  Left (−X)
</text>

<text x="572"
      y="250"
      text-anchor="middle"
      font-family="Segoe UI, sans-serif"
      font-size="12"
