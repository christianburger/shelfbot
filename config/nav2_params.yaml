# nav2_params.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Nav2 parameter file for shelfbot with slam_toolbox.
#
# FIXES applied:
#
# 1. collision_monitor REMOVED from lifecycle_manager node_names.
#    collision_monitor is not included in nav2_bringup navigation_launch.py
#    in ROS2 Humble. Including it caused lifecycle_manager to stall waiting
#    for a node that was never spawned, silently blocking full Nav2 activation.
#
# 2. velocity_smoother cmd_vel chain FIXED.
#    With collision_monitor removed, velocity_smoother publishes directly to
#    /cmd_vel. velocity_smoother now: subscribes /cmd_vel_nav (Nav2 output),
#    publishes /cmd_vel (hardware interface input).
#
# 3. controller_server remapping added so it publishes to /cmd_vel_nav,
#    which velocity_smoother then smooths and forwards to /cmd_vel.
#
# 4. lifecycle_manager node_names ORDER FIXED.
#    controller_server must be FIRST. The lifecycle manager activates nodes
#    in order and aborts on any failure. planner_server (global costmap)
#    requires the map→odom TF from slam_toolbox which may not be ready at
#    activation time — putting it first caused the whole stack to abort before
#    controller_server was ever reached, leaving all subsequent nodes in
#    unconfigured [1] state.
#
# 5. Scan frame_id corrected throughout.
#    The URDF (lidar_sensor.xacro / shelfbot.urdf.xacro) defines the lidar
#    as 'laser_link' attached to base_link via joint_laser.
#    robot_state_publisher broadcasts base_link → laser_link on /tf_static.
#    lidar_relay_node now stamps /scan with frame_id='laser_link'.
#    All TF references here use 'laser_link' to match.
#
# TF chain (must all be live before Nav2 activates at t=12s):
#   map → odom                   (slam_toolbox, t=6s)
#   odom → base_footprint        (FourWheelDriveOdometry, t=3s)
#   base_footprint → base_link   (robot_state_publisher/URDF, t=0s)
#   base_link → laser_link       (robot_state_publisher/URDF, t=0s)
# ─────────────────────────────────────────────────────────────────────────────

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    default_nav_to_pose_bt_xml: ""
    default_nav_through_poses_bt_xml: ""
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_smoother_selector_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 5.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.10
      yaw_goal_tolerance: 0.15

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.3
      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 0.6
      transform_tolerance: 0.5
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 0.25
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      use_rotate_to_heading: true
      allow_reversing: false
      rotate_to_heading_min_angle: 0.785
      max_angular_accel: 2.0
      max_robot_pose_search_dist: 10.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      # Local costmap stays in odom frame — works even before slam_toolbox
      # provides the map → odom TF. Local obstacle avoidance is always live.
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.30
      # transform_tolerance: generous at startup; the odom→base_footprint TF
      # is published by the hardware interface which starts at t=3s but may
      # take a few hundred ms to receive the first motor position from micro-ROS.
      transform_tolerance: 1.0
      plugins: ["voxel_layer", "inflation_layer"]

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 9.5
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.40

      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      # Global costmap MUST be in map frame to use the slam_toolbox occupancy grid.
      # If set to odom, the planner ignores the map and plans through walls.
      global_frame: map
      robot_base_frame: base_footprint
      robot_radius: 0.30
      resolution: 0.05
      track_unknown_space: true
      # transform_tolerance: generous because map→odom TF from slam_toolbox
      # may not be ready until ~6s after launch.
      transform_tolerance: 1.0
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        # transient_local QoS: costmap receives the map even if it subscribes
        # after slam_toolbox has already published. Critical at startup.
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 9.5
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.40

      always_send_full_costmap: true

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.5
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.6
    min_rotational_vel: 0.2
    rotational_acc_lim: 2.0

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    # velocity_smoother subscribes to /cmd_vel_nav (Nav2 controller output)
    # and publishes to /cmd_vel (hardware interface input).
    # The controller_server remapping in the launch file sends its output to
    # /cmd_vel_nav. velocity_smoother then rate-limits it before it reaches
    # the hardware. This replaces the broken collision_monitor chain.
    max_velocity: [0.5, 0.0, 1.0]
    min_velocity: [-0.5, 0.0, -1.0]
    max_accel: [1.5, 0.0, 2.0]
    max_decel: [-2.5, 0.0, -2.0]
    odom_topic: /odom
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    # FIX: collision_monitor removed — it is not launched by navigation_launch.py
    # in ROS2 Humble and its absence was stalling the lifecycle manager.
    # slam_toolbox is also NOT listed here — it manages its own lifecycle.
    #
    # FIX: ORDER IS CRITICAL. The lifecycle manager activates nodes in sequence
    # and aborts the entire chain on any failure. controller_server must be
    # first because its local costmap uses only the odom frame (always
    # available). planner_server's global costmap requires map→odom TF from
    # slam_toolbox — putting planner_server first caused it to time out waiting
    # for the map TF, aborting before controller_server was ever attempted,
    # which left bt_navigator, velocity_smoother, and waypoint_follower all
    # stuck in unconfigured [1] state.
    node_names:
      - controller_server
      - planner_server
      - smoother_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother
