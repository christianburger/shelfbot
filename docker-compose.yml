# ═══════════════════════════════════════════════════════════════════════════════
# Shelfbot — Docker Compose
#
# Host layout:
#   /home/chris/shelfbot/shelfbot/            ← repo root (run docker compose from here)
#
# Volume strategy:
#   workspace_vol (named volume) → /home/chris/shelfbot_ws   colcon workspace (persistent)
#   . (bind mount)               → /home/chris/shelfbot_ws/src/shelfbot   package source
#
# IDE settings stored in named volumes → survive container rebuilds/reboots.
#
# User and group identity:
#   /etc/passwd and /etc/group from the host are bind-mounted read-only into
#   the container.  This means the container sees exactly the same UID/GID
#   mappings and group memberships as the host — including whatever group owns
#   /dev/input/event* and chris's membership in it.  No GIDs are hardcoded
#   anywhere; no groupadd or usermod is needed at runtime.  This is the
#   standard Docker pattern for sharing host user identity with a container.
#
# Device access:
#   /dev:/dev bind-mount exposes all host input devices inside the container.
#   Access is granted automatically because the container inherits the host's
#   /etc/group, so group membership for device GIDs is already correct.
#
# Usage:
#   docker compose build
#   xhost +local:docker
#   docker compose up -d
#   docker compose exec shelfbot bash
#   docker compose down
# ═══════════════════════════════════════════════════════════════════════════════

services:
  shelfbot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_UID: "${DOCKER_UID:-1000}"
        USER_GID: "${DOCKER_GID:-1000}"

    image: shelfbot:humble
    container_name: shelfbot

    # Run as the host chris user.  No GID override — group membership is
    # resolved from the bind-mounted /etc/group, which is the host's own
    # group database and already contains all correct supplementary groups.
    user: "${DOCKER_UID:-1000}"

    network_mode: host

    volumes:
      # 1. Colcon workspace — persistent named volume
      - workspace_vol:/home/chris/shelfbot_ws

      # 2. Package source — the repo root mounted directly as the ROS package
      - .:/home/chris/shelfbot_ws/src/shelfbot

      # X11 socket
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

      # Persistent IDE configuration (CLion Gateway / JetBrains)
      - clion_cache:/home/chris/.cache/JetBrains
      - clion_config:/home/chris/.config/JetBrains
      - clion_local:/home/chris/.local/share/JetBrains

      # Host user and group databases — bind-mounted read-only so the container
      # sees the same UID/GID mappings and group memberships as the host.
      # This gives chris access to /dev/input/event* (and any other host
      # devices) without hardcoding GIDs or running groupadd at runtime.
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro

    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=0
      - MAKEFLAGS=-j${NPROC:-4}

    privileged: true
    devices:
      - /dev:/dev

    # Explicitly add the host's input group (GID 97) as a supplementary group.
    # This gives the container process access to /dev/input/event*.
    group_add:
      - "97"

    stdin_open: true
    tty: true

volumes:
  workspace_vol:
  clion_cache:
  clion_config:
  clion_local: